<!DOCTYPE html><html lang="zh-CN"><head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"> <title>实时预览HTML代码编辑器</title> <style> * { margin: 0; padding: 0; box-sizing: border-box; } body { background: #1e1f2c; font-family: 'Segoe UI', 'Fira Code', 'Monaco', 'Cascadia Code', monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; } /* 头部工具栏 */ .toolbar { background: #2d2f3e; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; border-bottom: 1px solid #3e4055; box-shadow: 0 2px 8px rgba(0,0,0,0.2); z-index: 10; } .logo { font-weight: 600; font-size: 1.2rem; background: linear-gradient(135deg, #7c9eff, #b77cff); background-clip: text; -webkit-background-clip: text; color: transparent; letter-spacing: 1px; } .logo span { font-size: 1.3rem; } .btn-group { display: flex; gap: 12px; } button { background: #3b3e55; border: none; color: #e4e6ff; padding: 6px 16px; border-radius: 30px; font-family: inherit; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 1px 2px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 6px; } button i { font-style: normal; font-weight: bold; font-size: 1rem; } button:hover { background: #565b7c; transform: translateY(-1px); } button:active { transform: translateY(1px); } .reset-btn { background: #5f3d7c; color: #f0e6ff; } .reset-btn:hover { background: #7a54a3; } /* 主区域：左右分屏 */ .main-container { display: flex; flex: 1; overflow: hidden; gap: 0; background: #252633; } /* 左侧编辑器面板 */ .editor-panel { flex: 1; display: flex; flex-direction: column; background: #1a1b26; border-right: 4px solid #3e4055; min-width: 280px; } .panel-header { background: #2c2e3f; padding: 8px 16px; font-size: 0.85rem; font-weight: 600; letter-spacing: 0.5px; color: #bbc2e0; border-bottom: 1px solid #3e4055; display: flex; justify-content: space-between; align-items: center; } .lang-badge { background: #3b3e55; padding: 2px 10px; border-radius: 30px; font-size: 0.7rem; font-family: monospace; } textarea { flex: 1; background: #1a1b26; color: #e2e6ff; border: none; padding: 18px 16px; font-family: 'Fira Code', 'Cascadia Code', 'Monaco', monospace; font-size: 14px; line-height: 1.5; resize: none; outline: none; tab-size: 4; white-space: pre-wrap; overflow: auto; } textarea::selection { background: #4c5b9e; } /* 右侧预览面板 */ .preview-panel { flex: 1; display: flex; flex-direction: column; background: #f5f7ff; } .preview-header { background: #2c2e3f; padding: 8px 16px; font-size: 0.85rem; font-weight: 600; color: #bbd0ff; border-bottom: 1px solid #3e4055; display: flex; justify-content: space-between; align-items: center; } .preview-frame { flex: 1; background: white; position: relative; } iframe { width: 100%; height: 100%; border: none; background: white; } /* 状态栏 */ .status-bar { background: #2d2f3e; padding: 5px 18px; font-size: 0.7rem; color: #9aa1c7; display: flex; justify-content: space-between; border-top: 1px solid #3e4055; font-family: monospace; } /* 响应式: 如果屏幕宽度小于700px 改为上下布局 */ @media (max-width: 700px) { .main-container { flex-direction: column; } .editor-panel { border-right: none; border-bottom: 3px solid #3e4055; min-height: 40%; } .editor-panel, .preview-panel { flex: auto; height: 50%; } } </style></head><body><div class="toolbar"> <div class="logo"> <span>◧</span> Live HTML Lab </div> <div class="btn-group"> <button id="refreshBtn" title="强制刷新预览 (Ctrl+Enter)"> <i>⟳</i> 刷新预览 </button> <button id="resetBtn" class="reset-btn" title="重置为示例代码"> <i>↺</i> 重置示例 </button> <button id="clearBtn" title="清空编辑器"> <i>⌫</i> 清空 </button> </div></div><div class="main-container"> <div class="editor-panel"> <div class="panel-header"> <span>📝 HTML / CSS / JS 编辑器</span> <span class="lang-badge">实时渲染 · 所见即所得</span> </div> <textarea id="codeEditor" spellcheck="false" placeholder="编写 HTML/CSS/JS 代码，右侧实时预览..."></textarea> </div> <div class="preview-panel"> <div class="preview-header"> <span>✨ 实时预览窗口</span> <span style="font-size: 0.7rem;">自动更新 · 沙箱隔离</span> </div> <div class="preview-frame"> <iframe id="previewIframe" title="实时预览" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe> </div> </div></div><div class="status-bar"> <span>💡 提示: 编辑即自动刷新 | 支持完整 HTML/CSS/JS</span> <span id="timestampStatus"></span></div><script> // 获取DOM元素 const editor = document.getElementById('codeEditor'); const iframe = document.getElementById('previewIframe'); const refreshBtn = document.getElementById('refreshBtn'); const resetBtn = document.getElementById('resetBtn'); const clearBtn = document.getElementById('clearBtn'); const timestampSpan = document.getElementById('timestampStatus'); // 默认示例代码 (一个美观的交互示例) const DEFAULT_HTML = `<!DOCTYPE html><html lang="zh"><head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>实时预览示例</title> <style> * { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(145deg, #f6f9fc 0%, #eef2f5 100%); font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; } .card { max-width: 650px; width: 100%; background: rgba(255,255,255,0.85); backdrop-filter: blur(2px); border-radius: 42px; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2), 0 2px 8px rgba(0,0,0,0.02); padding: 28px 32px; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.6); } h1 { font-size: 2rem; font-weight: 700; background: linear-gradient(135deg, #1f2b5c, #4a2f8d); background-clip: text; -webkit-background-clip: text; color: transparent; margin-bottom: 12px; letter-spacing: -0.3px; } .sub { color: #4a5568; border-left: 4px solid #7c3aed; padding-left: 16px; margin-bottom: 28px; font-weight: 500; } .interactive { background: #ffffffd9; border-radius: 28px; padding: 20px; margin: 20px 0; box-shadow: 0 6px 14px rgba(0,0,0,0.05); } button { background: #6c5ce7; border: none; color: white; padding: 10px 21px; border-radius: 40px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.2s; margin-right: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); } button:hover { background: #5a4ad1; transform: scale(0.97); } .counter { display: inline-block; background: #edf2f7; padding: 8px 18px; border-radius: 60px; font-weight: 700; font-size: 1.3rem; font-family: monospace; color: #2d3748; } .footer { margin-top: 24px; text-align: center; font-size: 0.75rem; color: #718096; } input { padding: 12px 16px; border-radius: 60px; border: 1px solid #cbd5e0; width: 70%; font-size: 0.9rem; outline: none; transition: all 0.2s; } input:focus { border-color: #6c5ce7; box-shadow: 0 0 0 2px #6c5ce740; } .greeting { margin-top: 12px; font-weight: 500; color: #4c51bf; } @keyframes fadeSlide { from { opacity: 0; transform: translateY(6px);} to { opacity: 1; transform: translateY(0);} } .card > * { animation: fadeSlide 0.3s ease-out; } </style></head><body><div class="card"> <h1>⚡ 实时预览 HTML 编辑器</h1> <div class="sub">左侧编辑代码 → 右侧实时渲染 | 支持 CSS/JS 完整功能</div> <div class="interactive"> <p style="margin-bottom: 12px; font-weight: 500;">✨ 互动小部件 (测试JS实时性)</p> <button id="clickBtn">点我 +1</button> <span class="counter" id="counterDisplay">0</span> <p style="margin-top: 16px;">✏️ 试试修改文本:</p> <input type="text" id="nameInput" placeholder="输入你的名字" value="开发者"> <div class="greeting" id="greetingMsg">你好，开发者！欢迎实时编辑 🚀</div> </div> <div class="footer"> 💡 提示: 修改左侧任意 HTML/样式/脚本都会立即反映在右侧~ </div></div><script> // 计数器演示 let count = 0; const counterEl = document.getElementById('counterDisplay'); const btn = document.getElementById('clickBtn'); if(btn) { btn.addEventListener('click', () => { count++; counterEl.innerText = count; }); } // 输入框动态问候 const nameInput = document.getElementById('nameInput'); const greetingMsg = document.getElementById('greetingMsg'); if(nameInput && greetingMsg) { const updateGreeting = () => { let name = nameInput.value.trim(); if(name === "") name = "访客"; greetingMsg.innerText = \`你好，\${name}！欢迎实时编辑 🚀\`; }; nameInput.addEventListener('input', updateGreeting); updateGreeting(); } // 初始计数器样式微调 console.log("实时预览环境已启动！");<\/script></body></html>`; // 保存当前代码版本，用于去抖或手动刷新 let currentCode = DEFAULT_HTML; let updateTimer = null; let iframeDoc = null; // 核心更新函数: 将编辑器中的代码渲染到 iframe function updatePreview(code) { if (!iframe) return; // 获取 iframe 的 document 对象 let doc = iframe.contentDocument || iframe.contentWindow.document; if (!doc) return; // 写入全新的HTML结构 doc.open(); doc.write(code); doc.close(); // 更新状态栏时间标记 const now = new Date(); timestampSpan.innerText = `🕒 最后渲染: ${now.toLocaleTimeString()}`; } // 从编辑器获取内容并刷新预览 (带防抖) function syncPreview(debounce = true) { const newCode = editor.value; currentCode = newCode; if (debounce) { if (updateTimer) clearTimeout(updateTimer); updateTimer = setTimeout(() => { updatePreview(currentCode); }, 180); } else { if (updateTimer) clearTimeout(updateTimer); updatePreview(currentCode); } } // 强制立即刷新 (不清除防抖但立即执行) function forceRefresh() { if (updateTimer) clearTimeout(updateTimer); const newCode = editor.value; currentCode = newCode; updatePreview(currentCode); } // 重置编辑器为默认示例 function resetToDefault() { editor.value = DEFAULT_HTML; forceRefresh(); } // 清空编辑器内容 function clearEditor() { editor.value = `<!DOCTYPE html><html><head> <meta charset="UTF-8"> <title>空白页面</title> <style> body { font-family: system-ui; background: #f1f5f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin:0; } .container { text-align: center; } </style></head><body> <div class="container"> <h1>✨ 新的起点</h1> <p>开始编写你的 HTML/CSS/JS 代码吧~</p> <button onclick="document.body.style.backgroundColor='#e0e7ff'">点击测试</button> </div></body></html>`; forceRefresh(); } // 监听编辑器输入事件 (实时更新) function onEditorInput() { syncPreview(true); } // 键盘快捷键支持: Ctrl/Cmd + Enter 强制刷新 function onEditorKeydown(e) { if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); forceRefresh(); // 给出视觉反馈（状态栏闪现） const oldText = timestampSpan.innerText; timestampSpan.innerText = '⚡ 手动刷新预览 ⚡'; setTimeout(() => { if (timestampSpan.innerText.includes('手动刷新')) { const now = new Date(); timestampSpan.innerText = `🕒 最后渲染: ${now.toLocaleTimeString()}`; } }, 800); } } // 初始化加载默认代码到编辑器及预览 function init() { editor.value = DEFAULT_HTML; currentCode = DEFAULT_HTML; // 立刻渲染 updatePreview(DEFAULT_HTML); // 事件绑定 editor.addEventListener('input', onEditorInput); editor.addEventListener('keydown', onEditorKeydown); refreshBtn.addEventListener('click', forceRefresh); resetBtn.addEventListener('click', resetToDefault); clearBtn.addEventListener('click', clearEditor); // 可选: 监听窗口resize时iframe重新聚焦之类，无需额外操作 // 增强: 如果由于安全沙箱导致某些脚本报错? 使用sandbox但保留必要权限: allow-same-origin allow-scripts 足够。 // 注意: sandbox 属性使用了 allow-same-origin allow-scripts allow-popups allow-forms allow-modals，确保大多数功能可用 iframe.setAttribute('sandbox', 'allow-same-origin allow-scripts allow-popups allow-forms allow-modals'); // 增加一个错误捕获: 当iframe内js错误时不会影响外层，非常安全 window.addEventListener('error', (e) => { // 静默处理外部错误，以免影响体验 }); // 更新状态 timestampSpan.innerText = `🕒 就绪 | 实时模式已启动`; } // 为了解决 iframe 初次加载时可能因为空白而引起的闪烁，再次确保初始渲染 // 并且当编辑器内容被外部修改时做保护 init(); // 额外的优化：当iframe加载失败或重新写入时，保持样式完整性。 // 如果用户代码包含未闭合标签等，iframe会尽力容错，浏览器机制保证。 // 增加一个便捷的demo: 在控制台输出启动消息 console.log('Live HTML Preview 已启动 — 编辑左侧代码，右侧即刻预览'); // 增加辅助重置焦点体验, 若用户点击刷新按钮手动刷新可确保最新内容 // 为了更强壮的实时性，可以使用 MutationObserver 但没必要 // 额外：当编辑器失去焦点时也可以做一次sync，不过默认防抖已经很好 // 附加: 监听编辑器内容变化时可能因为外部黏贴导致，都用防抖处理 // 如果用户短时间内大量输入，最后一次防抖保证最终效果 // 提供一个滚动条同步体验（非必要）</script></body></html>
