<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
<head>
    <title>PCROCK BLOG</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" type="text/css" media="screen" href="/pcrock/pcrock.css" />
    <link rel="shortcut icon" href="favicon.ico" />
    <style>
        /* 博客列表样式 */
        .blog-list {
            width: 680px;
            margin: 20px auto;
            background: rgba(240, 240, 240, 0.95);
            border-radius: 30px;
            padding: 20px 0;
            text-align: left;
        }
        .blog-item {
            padding: 12px 30px;
            border-bottom: 1px solid #ccc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .blog-item:last-child {
            border-bottom: none;
        }
        .blog-title {
            font-size: 18px;
            color: #202020;
            text-decoration: none;
            font-weight: bold;
        }
        .blog-title:hover {
            color: #FFCC33;
            text-decoration: underline;
        }
        .blog-date {
            font-size: 14px;
            color: #606060;
        }
        .no-posts {
            text-align: center;
            padding: 40px;
            color: #606060;
        }
        /* 播放器样式 - 窄版三按钮 */
        .music-player {
            width: 140px;
            margin: 10px auto;
            background: rgba(200, 200, 200, 0.8);
            border-radius: 40px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .music-player button {
            background: #404040;
            color: white;
            border: none;
            font-size: 18px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .music-player button:hover {
            background: #FFCC33;
            color: #202020;
        }
        /* 调整主面板高度适应内容 */
        .pcrock {
            height: auto;
            min-height: 240px;
            border-radius: 30px;
            padding: 15px 0;
        }
    </style>
</head>
<body bgcolor="#404040">
    <div style="text-align:center">
        <!-- 时间字体颜色已改为白色 -->
        <div id="time" style="color:#FFFFFF;font-size:28px;margin-top:10px"></div>
        
        <!-- 音乐播放器 - 三个按钮窄版 -->
        <div class="music-player">
            <button id="prevBtn">⏮</button>
            <button id="playBtn">▶</button>
            <button id="nextBtn">⏭</button>
        </div>

        <div class="pcrock">
            <a target="_blank" href="http://pcrock.hkfree.work/"><h1>PCROCK</h1></a>
            <!-- 博客文章列表容器 -->
            <div id="blogContainer" class="blog-list">
                <div class="no-posts">加载文章中...</div>
            </div>
        </div>

        <!-- 完全移除了原有导航和搜索框 -->
    </div>

    <!-- 粒子特效脚本 -->
    <script type="text/javascript" color="255,255,255" opacity="0.5" zindex="-2" count="180" src="/pcrock/pcrock.js"></script>
    
    <script>
        // ========== 博客功能 ==========
        async function loadPosts() {
            try {
                const response = await fetch('/posts.json');
                if (!response.ok) throw new Error('文章加载失败');
                const posts = await response.json();
                renderPosts(posts);
            } catch (error) {
                document.getElementById('blogContainer').innerHTML = '<div class="no-posts">暂无文章，请在 posts.json 中添加</div>';
                console.error(error);
            }
        }

        function renderPosts(posts) {
            const container = document.getElementById('blogContainer');
            if (!posts.length) {
                container.innerHTML = '<div class="no-posts">暂无文章</div>';
                return;
            }
            container.innerHTML = posts.map(post => `
                <div class="blog-item">
                    <a class="blog-title" href="/post.html?id=${post.id}">${post.title}</a>
                    <span class="blog-date">${post.date}</span>
                </div>
            `).join('');
        }

        // ========== 音乐播放器 ==========
        let playlist = [];   // [{ name, url }]
        let currentIndex = 0;
        let audio = new Audio();
        let isPlaying = false;

        // 加载播放列表
        async function loadPlaylist() {
            try {
                const response = await fetch('/playlist.txt');
                const text = await response.text();
                const lines = text.split('\n');
                playlist = [];
                for (let line of lines) {
                    line = line.trim();
                    if (line === '') continue;
                    const [name, url] = line.split(',');
                    if (name && url) {
                        playlist.push({ name: name.trim(), url: url.trim() });
                    }
                }
                if (playlist.length > 0) {
                    currentIndex = Math.floor(Math.random() * playlist.length);
                    loadSong(currentIndex);
                }
            } catch (error) {
                console.error('播放列表加载失败', error);
            }
        }

        function loadSong(index) {
            if (playlist.length === 0) return;
            const song = playlist[index];
            audio.src = song.url;
            if (isPlaying) {
                audio.play().catch(e => console.log('播放失败', e));
            }
        }

        function playPause() {
            if (playlist.length === 0) return;
            if (isPlaying) {
                audio.pause();
                document.getElementById('playBtn').innerHTML = '▶';
            } else {
                audio.play().catch(e => console.log('播放失败', e));
                document.getElementById('playBtn').innerHTML = '⏸';
            }
            isPlaying = !isPlaying;
        }

        function nextSong() {
            if (playlist.length === 0) return;
            currentIndex = Math.floor(Math.random() * playlist.length);
            loadSong(currentIndex);
            if (isPlaying) {
                audio.play().catch(e => console.log('播放失败', e));
            }
            document.getElementById('playBtn').innerHTML = '⏸';
        }

        function prevSong() {
            if (playlist.length === 0) return;
            currentIndex = Math.floor(Math.random() * playlist.length);
            loadSong(currentIndex);
            if (isPlaying) {
                audio.play().catch(e => console.log('播放失败', e));
            }
            document.getElementById('playBtn').innerHTML = '⏸';
        }

        // 绑定事件
        document.getElementById('playBtn').onclick = playPause;
        document.getElementById('nextBtn').onclick = nextSong;
        document.getElementById('prevBtn').onclick = prevSong;

        // 歌曲播放结束后自动随机下一首
        audio.addEventListener('ended', nextSong);

        // 初始化
        loadPosts();
        loadPlaylist();
    </script>
    <script>
        // 时间显示
        setInterval("time.innerHTML = new Date().toLocaleString('chinese',{hour12:false});",1000);
    </script>
    <!-- 右键屏障 -->
    <script>
        document.oncontextmenu = new Function("event.returnValue=false;");
        document.onselectstart = new Function("event.returnValue=false;");
    </script>
</body>
</html>
