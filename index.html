<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCROCK 博客</title>
    <style>
        body {
            background: #404040;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #f0f0f0;
            border-radius: 30px;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #202020;
        }
        .post-list {
            list-style: none;
            padding: 0;
        }
        .post-list li {
            border-bottom: 1px solid #ccc;
            padding: 12px 0;
        }
        .post-list a {
            text-decoration: none;
            font-size: 18px;
            color: #202020;
            font-weight: bold;
        }
        .post-list a:hover {
            color: #FFCC33;
        }
        .post-date {
            float: right;
            color: #606060;
            font-size: 14px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #606060;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PCROCK 博客</h1>
        <div id="time" style="text-align:center;font-size:20px;margin-bottom:20px"></div>
        <div id="posts-container" class="loading">加载文章列表中...</div>
    </div>

    <script>
        // 显示时间
        setInterval(() => {
            document.getElementById('time').innerText = new Date().toLocaleString('zh-CN');
        }, 1000);

        // 文章列表配置 —— 每次新增文章，在这里加一条记录
        const posts = [
{ file: "_posts/2026-04-18-第一篇文章.md", title: "第一篇文章", date: "2026-04-18" }
            { file: "_posts/2026-04-18-第一篇文章.md", title: "第一篇文章", date: "2026-04-18" },
            { file: "_posts/2026-04-17-第二篇文章.md", title: "第二篇文章", date: "2026-04-17" }
            // ⬆️ 新增文章时，复制上面一行，修改文件名、标题、日期即可
        ];

        // 渲染文章列表
        const container = document.getElementById('posts-container');
        if (posts.length === 0) {
            container.innerHTML = '<div class="loading">暂无文章</div>';
        } else {
            const list = document.createElement('ul');
            list.className = 'post-list';
            posts.forEach(post => {
                const li = document.createElement('li');
                const link = document.createElement('a');
                link.href = `post.html?file=${encodeURIComponent(post.file)}&title=${encodeURIComponent(post.title)}`;
                link.innerText = post.title;
                const dateSpan = document.createElement('span');
                dateSpan.className = 'post-date';
                dateSpan.innerText = post.date;
                li.appendChild(link);
                li.appendChild(dateSpan);
                list.appendChild(li);
            });
            container.innerHTML = '';
            container.appendChild(list);
        }
    </script>
</body>
</html>
