<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>歌曲链接批量检测工具</title>
    <style>
        body {
            font-family: monospace;
            background: #404040;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #f0f0f0;
            border-radius: 20px;
            padding: 20px;
        }
        textarea {
            width: 100%;
            height: 200px;
            font-family: monospace;
            margin: 10px 0;
        }
        button {
            background: #404040;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
        }
        button:hover {
            background: #FFCC33;
            color: #202020;
        }
        .result {
            margin-top: 20px;
            border-top: 1px solid #ccc;
            padding-top: 10px;
        }
        .valid { color: green; }
        .invalid { color: red; }
    </style>
</head>
<body>
<div class="container">
    <h2>🎵 歌曲链接批量检测工具</h2>
    <p>粘贴你的 playlist.txt 内容（一行一首，格式：歌名$链接）</p>
    <textarea id="playlistInput" placeholder="夜曲$https://example.com/song1.mp3
晴天$https://example.com/song2.mp3"></textarea>
    <button onclick="checkAll()">开始检测</button>
    <div id="result" class="result"></div>
</div>

<script>
async function checkAll() {
    const textarea = document.getElementById('playlistInput');
    const lines = textarea.value.split('\n');
    const resultDiv = document.getElementById('result');
    resultDiv.innerHTML = '<p>检测中，请稍候...</p>';
    
    let results = [];
    
    for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (line === '') continue;
        
        const [name, url] = line.split('$');
        if (!url) {
            results.push({ name: name || '未知', url: '格式错误', status: false, error: '格式不对，缺少$分隔符' });
            continue;
        }
        
        try {
            const response = await fetch(url, { method: 'HEAD' });
            if (response.ok) {
                results.push({ name: name, url: url, status: true });
            } else {
                results.push({ name: name, url: url, status: false, error: `HTTP ${response.status}` });
            }
        } catch(e) {
            results.push({ name: name, url: url, status: false, error: '无法访问' });
        }
        
        // 更新进度
        resultDiv.innerHTML = `<p>检测中... ${i+1}/${lines.length}</p>`;
    }
    
    // 显示结果
    let html = '<h3>检测结果：</h3>';
    let validCount = 0, invalidCount = 0;
    for (const r of results) {
        if (r.status) {
            validCount++;
            html += `<div class="valid">✅ ${r.name} → ${r.url}</div>`;
        } else {
            invalidCount++;
            html += `<div class="invalid">❌ ${r.name} → ${r.url}<br>　原因：${r.error}</div>`;
        }
    }
    html += `<p><strong>汇总：</strong> ✅ ${validCount} 个有效 | ❌ ${invalidCount} 个失效</p>`;
    resultDiv.innerHTML = html;
}
</script>
</body>
</html>
