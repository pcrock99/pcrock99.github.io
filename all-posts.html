<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>所有文章 - PCROCK</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            line-height: 1.5;
            padding: 2rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #33ff33;
            border-bottom: 1px solid #33ff33;
            padding-bottom: 0.3rem;
        }
        .post-list {
            list-style: none;
            padding: 0;
        }
        .post-list li {
            margin: 1rem 0;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #2d2d2d;
        }
        .post-list a {
            color: #33ff33;
            text-decoration: none;
            font-size: 1.2rem;
        }
        .post-list a:hover {
            text-decoration: underline;
        }
        .post-date {
            color: #8b949e;
            font-size: 0.85rem;
            margin-left: 1rem;
        }
        .back-home {
            display: inline-block;
            margin-top: 2rem;
            color: #33ff33;
            text-decoration: none;
            border: 1px solid #33ff33;
            padding: 0.5rem 1rem;
            border-radius: 4px;
        }
        .back-home:hover {
            background-color: #33ff33;
            color: #0a0a0a;
        }
        .loading {
            text-align: center;
            margin-top: 3rem;
            color: #8b949e;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📝 所有文章</h1>
    <div id="posts-container" class="loading">加载文章列表中...</div>
    <a href="/bg/" class="back-home">← 返回首页</a>
</div>

<script>
    async function loadAllPosts() {
        const container = document.getElementById('posts-container');
        
        // 获取 _posts 目录下所有 .md 文件
        // 注意：由于 GitHub Pages 的限制，我们无法直接“列出”一个文件夹的内容。
        // 这里我们采用一个更可靠的方法：先生成一个文件列表。
        // 为了让这个页面能工作，我们需要手动维护一个文章列表。
        // 或者，如果你不想手动维护，我可以教你另一个更一劳永逸的方法。
        
        // 方案：手动维护文章列表 (这是目前最兼容、最稳定的方法)
        // 你只需要在这里添加你的文章即可，格式如下：
        const posts = [
            { title: "示例文章标题", date: "2024-01-01", url: "/bg/2024/01/01/example-title.html" },
            // 请在此处按照上面的格式，添加你所有的文章
            // 你可以从你的首页列表里复制这些信息
        ];
        
        if (posts.length === 0) {
            container.innerHTML = '<p>暂无文章，请先在代码中添加文章列表。</p>';
            return;
        }
        
        let html = '<ul class="post-list">';
        for (const post of posts) {
            html += `
                <li>
                    <a href="${post.url}">${post.title}</a>
                    <span class="post-date">${post.date}</span>
                </li>
            `;
        }
        html += '</ul>';
        container.innerHTML = html;
    }
    
    loadAllPosts();
</script>
</body>
</html>
