<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>文章 - PCROCK</title>
    <style>
        body {
            background: #404040;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            width: 90%;
            margin: 0 auto;
            background: #f0f0f0;
            border-radius: 30px;
            padding: 20px;
            box-sizing: border-box;
        }
        .post-title {
            font-size: 24px;
            margin-bottom: 10px;
            border-bottom: 2px solid #FFCC33;
            padding-bottom: 10px;
            word-break: break-word;
        }
        .post-content {
            line-height: 1.6;
            font-size: 16px;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        .post-content pre,
        .post-content code {
            white-space: pre-wrap;
            word-break: break-all;
            background: #e0e0e0;
            padding: 2px 6px;
            border-radius: 6px;
            display: inline-block;
            max-width: 100%;
            overflow-x: auto;
        }
        .post-content pre {
            padding: 12px;
            overflow-x: auto;
        }
        .post-content img,
        .post-content table {
            max-width: 100%;
            height: auto;
        }
        .back-link {
            display: inline-block;
            margin-top: 30px;
            background: #606060;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
        }
        .back-link:hover {
            background: #FFCC33;
            color: #202020;
        }
        .error {
            color: red;
            text-align: center;
            padding: 40px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #606060;
        }
        @media (max-width: 600px) {
            .container {
                width: 95%;
                padding: 15px;
            }
            .post-title {
                font-size: 20px;
            }
            .post-content {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="post-title" class="post-title">加载中...</div>
        <div id="post-content" class="post-content loading">正在加载文章...</div>
        <a href="index.html" class="back-link">← 返回首页</a>
    </div>

    <script>
        // 获取 URL 中的 id 参数
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        if (!postId) {
            document.getElementById('post-title').innerText = '错误';
            document.getElementById('post-content').innerHTML = '<div class="error">文章地址无效，缺少 id 参数</div>';
        } else {
            // 从 posts.json 加载文章数据
            fetch('/posts.json')
                .then(response => {
                    if (!response.ok) throw new Error('无法加载 posts.json');
                    return response.json();
                })
                .then(posts => {
                    // 根据 id 查找文章（注意 id 可能是字符串或数字）
                    const post = posts.find(p => p.id == postId);
                    
                    if (!post) {
                        document.getElementById('post-title').innerText = '未找到';
                        document.getElementById('post-content').innerHTML = '<div class="error">未找到 id 为 ' + postId + ' 的文章</div>';
                        return;
                    }
                    
                    // 显示文章
                    document.title = post.title + ' - PCROCK';
                    document.getElementById('post-title').innerText = post.title;
                    document.getElementById('post-content').innerHTML = post.content;
                })
                .catch(error => {
                    console.error('加载文章失败:', error);
                    document.getElementById('post-title').innerText = '错误';
                    document.getElementById('post-content').innerHTML = '<div class="error">加载文章失败，请检查网络或 posts.json 文件</div>';
                });
        }
    </script>
</body>
</html>
