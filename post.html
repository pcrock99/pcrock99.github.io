<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章 - PCROCK</title>
    <style>
        body {
            background: #404040;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #f0f0f0;
            border-radius: 30px;
            padding: 30px;
        }
        .post-title {
            font-size: 28px;
            margin-bottom: 10px;
            border-bottom: 2px solid #FFCC33;
            padding-bottom: 10px;
        }
        .post-content {
            line-height: 1.6;
            font-size: 16px;
        }
        .back-link {
            display: inline-block;
            margin-top: 30px;
            background: #606060;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
        }
        .back-link:hover {
            background: #FFCC33;
            color: #202020;
        }
        .error {
            color: red;
            text-align: center;
            padding: 40px;
        }
    </style>
    <!-- 引入 marked.js 解析 Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <div id="post-title" class="post-title">加载中...</div>
        <div id="post-content" class="post-content">正在读取文章...</div>
        <a href="index.html" class="back-link">← 返回首页</a>
    </div>

    <script>
        // 获取 URL 参数
        const urlParams = new URLSearchParams(window.location.search);
        const filePath = urlParams.get('file');
        const postTitle = urlParams.get('title');

        if (!filePath) {
            document.getElementById('post-title').innerText = '错误';
            document.getElementById('post-content').innerHTML = '<div class="error">文章地址无效</div>';
        } else {
            document.title = postTitle + ' - PCROCK';
            document.getElementById('post-title').innerText = postTitle;
            
            // 加载 Markdown 文件
            fetch(filePath)
                .then(response => {
                    if (!response.ok) throw new Error('文章不存在');
                    return response.text();
                })
                .then(markdown => {
                    // 用 marked 解析成 HTML
                    const html = marked.parse(markdown);
                    document.getElementById('post-content').innerHTML = html;
                })
                .catch(error => {
                    document.getElementById('post-content').innerHTML = '<div class="error">文章加载失败，请检查文件路径</div>';
                    console.error(error);
                });
        }
    </script>
</body>
</html>
