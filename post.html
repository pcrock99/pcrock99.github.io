<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
<head>
    <title>文章 - PCROCK</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" type="text/css" media="screen" href="/pcrock/pcrock.css" />
    <link rel="shortcut icon" href="favicon.ico" />
    <style>
        .post-container {
            width: 680px;
            margin: 20px auto;
            background: rgba(240, 240, 240, 0.95);
            border-radius: 30px;
            padding: 30px;
            text-align: left;
        }
        .post-title {
            font-size: 28px;
            color: #202020;
            border-bottom: 2px solid #FFCC33;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .post-date {
            color: #606060;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .post-content {
            font-size: 16px;
            line-height: 1.6;
            color: #202020;
        }
        .post-content p {
            margin: 15px 0;
        }
        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #FFD306;
            background: #404040;
            padding: 8px 20px;
            border-radius: 20px;
            text-decoration: none;
        }
        .back-link:hover {
            background: #FFCC33;
            color: #202020;
        }
        .pcrock {
            height: auto;
            min-height: 240px;
            border-radius: 30px;
            padding: 15px 0;
        }
    </style>
</head>
<body bgcolor="#404040">
    <div style="text-align:center">
        <div class="pcrock">
            <a target="_blank" href="http://pcrock.hkfree.work/"><h1>PCROCK</h1></a>
            <div id="postContainer" class="post-container">
                <div style="text-align:center;padding:40px">加载文章中...</div>
            </div>
        </div>
    </div>

    <script type="text/javascript" color="255,255,255" opacity="0.5" zindex="-2" count="180" src="/pcrock/pcrock.js"></script>
    <script>
        async function loadPost() {
            const urlParams = new URLSearchParams(window.location.search);
            const postId = urlParams.get('id');
            if (!postId) {
                document.getElementById('postContainer').innerHTML = '<div class="post-container" style="text-align:center">文章不存在</div>';
                return;
            }
            try {
                const response = await fetch('/posts.json');
                const posts = await response.json();
                const post = posts.find(p => p.id == postId);
                if (!post) {
                    document.getElementById('postContainer').innerHTML = '<div class="post-container" style="text-align:center">文章未找到</div>';
                    return;
                }
                document.title = post.title + ' - PCROCK';
                document.getElementById('postContainer').innerHTML = `
                    <div class="post-title">${post.title}</div>
                    <div class="post-date">${post.date}</div>
                    <div class="post-content">${post.content}</div>
                    <a href="/" class="back-link">← 返回首页</a>
                `;
            } catch (error) {
                document.getElementById('postContainer').innerHTML = '<div class="post-container" style="text-align:center">文章加载失败</div>';
            }
        }
        loadPost();
    </script>
    <script>
        document.oncontextmenu = new Function("event.returnValue=false;");
        document.onselectstart = new Function("event.returnValue=false;");
    </script>
</body>
</html>
